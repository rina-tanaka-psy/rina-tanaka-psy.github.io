<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selected Paper - ソーシャルサポートの提供の文化比較研究</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-bg: #faf9f7;
      --c-surface: #ffffff;
      --c-border: rgba(0,0,0,0.12);
      --c-text: #1a1a18;
      --c-muted: #575650;
      --c-accent: #1e3a5f;
      --font-serif: 'Noto Serif JP', Georgia, serif;
      --font-sans: 'Noto Sans JP', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: var(--font-sans);
      background: var(--c-bg);
      color: var(--c-text);
      line-height: 1.8;
      padding: 2rem 1.5rem;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 20px;
      padding: 2rem 2.2rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    }
    h1 {
      font-family: var(--font-serif);
      font-size: 28px;
      color: var(--c-accent);
      margin-bottom: 0.75rem;
    }
    .subtitle {
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--c-muted);
      margin-bottom: 1.8rem;
    }
    .paper-info {
      font-size: 16px;
      color: var(--c-text);
      background: #f8f8f7;
      border: 1px solid rgba(30,58,95,0.08);
      border-radius: 14px;
      padding: 1.4rem 1.6rem;
      margin-bottom: 2rem;
    }
    .paper-info p {
      margin-bottom: 0.9rem;
    }
    .paper-info strong {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--c-accent);
    }
    .back-link {
      display: inline-block;
      margin-top: 1rem;
      color: var(--c-accent);
      text-decoration: none;
      border: 1px solid var(--c-accent);
      border-radius: 999px;
      padding: 10px 18px;
      transition: background 0.2s, color 0.2s;
    }
    .back-link:hover {
      background: var(--c-accent);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Selected Paper</h1>
    <div class="subtitle">ソーシャルサポートの提供の文化比較研究</div>
    <div class="paper-info">
      <strong>Tanaka R, Zheng S and Ishii K (2023)</strong>
      <p>Cultural differences in explicit and implicit support provision and underlying motivations for self-esteem, closeness, and relational concerns.</p>
      <p>Front. Psychol. 14:1202729. doi: 10.3389/fpsyg.2023.1202729</p>
    </div>
    <a class="back-link" href="index.html">ホームページに戻る</a>
  </div>
</body>
</html>
